name: Validate build and data quality

on:
  push:
    branches:
      - main
      - claude/**
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check data quality
        run: npm run check:data-quality

      - name: Build app
        run: npm run build
