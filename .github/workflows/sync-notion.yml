name: Sync Notion Data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync_notion_after_reel_submit]
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  sync-notion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run Notion sync
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_CITIES_DATA_SOURCE_ID: ${{ secrets.NOTION_CITIES_DATA_SOURCE_ID }}
          NOTION_SPOTS_DATA_SOURCE_ID: ${{ secrets.NOTION_SPOTS_DATA_SOURCE_ID }}
          NOTION_EVENTS_DATA_SOURCE_ID: ${{ secrets.NOTION_EVENTS_DATA_SOURCE_ID }}
          NOTION_SOURCES_DATA_SOURCE_ID: ${{ secrets.NOTION_SOURCES_DATA_SOURCE_ID }}
        run: node scripts/sync-notion.mjs

      - name: Commit generated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git diff --cached --quiet || git commit -m "chore: sync Notion data"
          git push
